					</mask>
					<circle id="sun" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
					<g id="sun-beams" stroke="currentColor">
						<line x1="12" y1="1" x2="12" y2="3" />
						<line x1="12" y1="21" x2="12" y2="23" />

						<line x1="21" y1="12" x2="23" y2="12" />

						<line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />

				</svg>

			<label for="hamburger-checkbox" class="hamburger-label">&#8801;</label>

								<div class="face back"></div>
								<div class="face top"></div>

							</div>
						</div>

						<div class="button-container">
							<a href="https://github.com/mxilinas" style="margin-bottom: 18px;" draggable="false">Github
